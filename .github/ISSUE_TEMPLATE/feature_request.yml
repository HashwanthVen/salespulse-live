name: Feature request
description: Suggest a dashboard improvement
title: "[Feature] "
labels: ["enhancement", "demo-request"]
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-line summary of the request.
      placeholder: e.g. Add win/loss reason breakdown panel
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Who is this for and why does it matter?
      description: Audience persona (VP Sales, RevOps, Sales Manager, AE, CFO, Marketing) + problem.
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed behavior
      description: What should this look like after the change?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - KPI desk
        - Pipeline funnel
        - Forecast vs quota chart
        - Top deals table
        - Rep leaderboard
        - Segments / regions
        - Risk panel
        - AI insights
        - Audience feedback panel
        - Mobile / responsive
        - Other
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low
        - Medium
        - High
    validations:
      required: true
